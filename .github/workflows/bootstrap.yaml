name: Cluster Bootstrap & Sync
on:
  push:
    branches: [ main ]

jobs:
  bootstrap-k3s:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ansible Collections
        run: |
          ansible-galaxy collection install kubernetes.core

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run Full Cluster Bootstrap
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          ansible-playbook -i '${{ secrets.SERVER_IP }},' \
            --user ${{ secrets.USER }} \
            --private-key ~/.ssh/id_rsa \
            --extra-vars "ansible_ssh_common_args='-o StrictHostKeyChecking=no' ansible_become_password='${{ secrets.BECOME_PASSWORD }}'" \
            ansible/main.yml
  gitops-sync:
    needs: bootstrap-k3s
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Kubernetes Manifests
        run: |
          kubectl apply --dry-run=client -R -f bootstrap/

      - name: Pre-Flight Check (Verify Mounts)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USER }}@${{ secrets.SERVER_IP }} \
            "mountpoint -q /mnt/k3s-system && mountpoint -q /mnt/fast-scratch"
          rm ~/.ssh/id_rsa

      - name: Bootstrap Root Application
        run: |
          kubectl apply -f bootstrap/root-app.yaml

      - name: Force ArgoCD Sync (Heal Drift)
        run: |
          kubectl patch application root-app -n argocd --type merge -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
