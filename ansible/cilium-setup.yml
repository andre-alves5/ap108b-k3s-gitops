---
- name: Deploy K3s environment with Cilium
  hosts: all
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    cilium_version: "1.15.3"
    cluster_cidr: "10.110.0.0/16"
    external_cidr_start: "10.108.4.50"
    external_cidr_stop: "10.108.4.60"

  tasks:
    - name: Add Cilium Helm repo
      kubernetes.core.helm_repository:
        name: cilium
        repo_url: https://helm.cilium.io/

    - name: Install Cilium via Helm (Unified Config)
      kubernetes.core.helm:
        release_name: cilium
        chart_ref: cilium/cilium
        release_namespace: kube-system
        create_namespace: true
        chart_version: "{{ cilium_version }}"
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        wait: false
        release_values:
          k8sServiceHost: 127.0.0.1
          k8sServicePort: 6443
          k8sClientRateLimit:
            qps: 10
            burst: 20
          operator:
            replicas: 1
          ipam:
            mode: cluster-pool
            operator:
              clusterPoolIPv4PodCIDRList: ["{{ cluster_cidr }}"]
              clusterPoolIPv4MaskSize: 24
          routingMode: tunnel
          tunnelProtocol: vxlan
          kubeProxyReplacement: "true"
          ingressController:
            enabled: true
            default: true
            loadBalancerMode: shared
          envoy:
            enabled: true
          l2announcements:
            enabled: true
          externalIPs:
            enabled: true
          loadBalancer:
            l2:
              enabled: true
          hubble:
            enabled: true
            relay:
              enabled: true
            ui:
              enabled: true

    - name: Create Cilium LoadBalancer IP Pool
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: cilium.io/v2alpha1
          kind: CiliumLoadBalancerIPPool
          metadata:
            name: blue-pool
            namespace: kube-system
          spec:
            blocks:
              - start: "{{ external_cidr_start }}"
                stop: "{{ external_cidr_stop }}"

    - name: Create L2 Announcement Policy
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: cilium.io/v2alpha1
          kind: CiliumL2AnnouncementPolicy
          metadata:
            name: default-l2-policy
            namespace: kube-system
          spec:
            externalIPs: true
            loadBalancerIPs: true
            nodeSelector:
              matchLabels:
                kubernetes.io/hostname: cm3588-nas

    - name: Wait for Cilium pods to be Running
      kubernetes.core.k8s_info:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        kind: Pod
        namespace: kube-system
        label_selectors:
          - k8s-app=cilium
      register: cilium_pods
      until: >
        cilium_pods.resources | length > 0 and
        cilium_pods.resources | map(attribute='status.phase') | unique | list == ['Running']
      retries: 20
      delay: 10

    - name: Wait for Cilium Operator to be Ready
      kubernetes.core.k8s_info:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        kind: Deployment
        name: cilium-operator
        namespace: kube-system
      register: operator_deploy
      until: >
        operator_deploy.resources | length > 0 and
        (operator_deploy.resources[0].status.readyReplicas | default(0)) > 0
      retries: 15
      delay: 10
