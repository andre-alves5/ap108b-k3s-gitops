---
- name: Deploy K3s environment with Cilium
  hosts: all
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    cluster_cidr: "10.110.0.0/16"
    service_cidr: "10.43.0.0/16"

  tasks:

    - name: Add Cilium Helm repo
      kubernetes.core.helm_repository:
        name: cilium
        repo_url: https://helm.cilium.io/

    - name: Install Cilium via Helm
      kubernetes.core.helm:
        release_name: cilium
        chart_ref: cilium/cilium
        release_namespace: kube-system
        create_namespace: true
        chart_version: 1.15.3
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        release_values:
          operator:
            replicas: 1
          ipam:
            mode: cluster-pool
            operator:
              clusterPoolIPv4PodCIDRList: ["{{ cluster_cidr }}"]
              clusterPoolIPv4MaskSize: 24
          k8s-install-cilium-pod-cidr: "true"
          routingMode: tunnel
          tunnelProtocol: vxlan
          kubeProxyReplacement: disabled
          k8sServiceHost: 127.0.0.1
          k8sServicePort: 6443
          l2announcements:
            enabled: true
          externalIPs:
            enabled: true
          hubble:
            enabled: false
            relay:
              enabled: false
            ui:
              enabled: true
          ingressController:
            enabled: false

    - name: Wait for Cilium pods to be ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: kube-system
        label_selectors:
          - k8s-app=cilium
      register: cilium_pods
      until: >
        (cilium_pods.resources | default([])) | length > 0 and
        (
          (cilium_pods.resources | default([]))
          | map(attribute='status.containerStatuses') | flatten
          | map(attribute='ready') | list
          | min
        )
      retries: 30
      delay: 10
