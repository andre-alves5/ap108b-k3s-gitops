---
- name: Deploy kube-prometheus-stack
  hosts: all
  become: true
  vars_files:
    - ../vars/main_vars.yml

  tasks:
    - name: Add Prometheus Helm repo
      kubernetes.core.helm_repository:
        name: prometheus-community
        repo_url: https://prometheus-community.github.io/helm-charts

    - name: Ensure monitoring namespace exists
      kubernetes.core.k8s:
        name: monitoring
        kind: Namespace
        state: present
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Install Prometheus Operator CRDs (Manual SSA)
      kubernetes.core.k8s:
        src: "{{ item }}"
        server_side_apply:
          field_manager: ansible
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
      loop:
        - "https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_alertmanagers.yaml"
        - "https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_prometheuses.yaml"
        - "https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_prometheusrules.yaml"
        - "https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml"
        - "https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_podmonitors.yaml"

    - name: Apply Grafana Sealed Secret
      kubernetes.core.k8s:
        definition: "{{ lookup('file', '../secrets/grafana-sealed-secret.yaml') | from_yaml }}"
        namespace: monitoring
        kubeconfig: "{{ kubeconfig_path }}"
        state: present

    - name: Install kube-prometheus-stack
      kubernetes.core.helm:
        release_name: obs-prometheus
        release_namespace: monitoring
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: 56.6.0
        create_namespace: true
        kubeconfig: "{{ kubeconfig_path }}"
        skip_crds: true
        wait: true
        values:
          prometheusOperator:
            admissionWebhooks:
              patch:
                enabled: false
            thanosRuler:
              enabled: false
            disabledNamespaces: []
            manageCrds: false
          prometheus:
            prometheusSpec:
              retention: 5d
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 20Gi
          grafana:
            admin:
              existingSecret: "grafana-admin-credentials"
              userKey: "admin-user"
              passwordKey: "admin-password"
            persistence:
              enabled: true
              storageClassName: local-path
              size: 10Gi
            ingress:
              enabled: true
              ingressClassName: cilium
              annotations:
                cert-manager.io/cluster-issuer: "homelab-ca-issuer"
                ingress.cilium.io/service-type: LoadBalancer
                ingress.cilium.io/loadbalancer-mode: shared
                network.cilium.io/ingress-visibility: external
              hosts:
                - grafana.agallaghertech.site
              path: /
              service:
                port: 80
