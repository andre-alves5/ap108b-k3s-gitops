---
- name: Deploy ArgoCD
  hosts: all
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Add ArgoCD Helm repo
      kubernetes.core.helm_repository:
        name: argo
        repo_url: https://argoproj.github.io/argo-helm

    - name: Install ArgoCD via Helm
      kubernetes.core.helm:
        release_name: argocd
        chart_ref: argo/argo-cd
        release_namespace: argocd
        create_namespace: true
        chart_version: 9.5.2
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Wait for ArgoCD server deployment to be ready
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: argocd-server
        namespace: argocd
        wait: yes
        wait_timeout: 300
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Create Ingress for ArgoCD
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: argocd-server-ingress
            namespace: argocd
            annotations:
              kubernetes.io/ingress.class: cilium
              ingress.cilium.io/service-type: LoadBalancer
              cilium.io/ingress.ssl-passthrough: "true"
          spec:
            ingressClassName: cilium
            tls:
              - hosts:
                  - argocd.agallaghertech.online
            rules:
              - host: argocd.agallaghertech.online
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: argocd-server
                          port:
                            name: https
