---
- name: Manage K3s Lifecycle
  hosts: all
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    k3s_version: "v1.33.6+k3s1"
    cluster_cidr: "10.110.0.0/16"
    service_cidr: "10.43.0.0/16"

  tasks:
    - name: Ensure K3s config directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Deploy K3s Configuration
      copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          cluster-cidr: {{ cluster_cidr }}
          service-cidr: {{ service_cidr }}
          flannel-backend: "none"
          disable-network-policy: true
          disable:
            - servicelb
            - traefik
          write-kubeconfig-mode: "0644"
        mode: '0644'
      register: k3s_config

    - name: Clean up old K3s processes if config changed
      command: /usr/local/bin/k3s-killall.sh
      when: k3s_config.changed
      ignore_errors: yes

    - name: Wipe K3s database to reset CIDR assignments
      file:
        path: /var/lib/rancher/k3s/server/db
        state: absent
      when: k3s_config.changed

    - name: Install or Upgrade K3s
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server
      environment:
        INSTALL_K3S_EXEC: "server"
      when: k3s_config.changed or (ansible_local.k3s.settings.version | default('')) != k3s_version

    - name: Create Ansible custom facts directory
      file:
        path: /etc/ansible/facts.d
        state: directory
        mode: '0755'

    - name: Record installed K3s version as a local fact
      copy:
        dest: /etc/ansible/facts.d/k3s.fact
        content: |
          [settings]
          version={{ k3s_version }}
        mode: '0644'

    - name: Wait for K3s API to be ready
      wait_for:
        port: 6443
        delay: 5
        timeout: 60

    - name: Deploy Cilium via K3s Helm Controller
      copy:
        dest: /var/lib/rancher/k3s/server/manifests/cilium.yaml
        content: |
          apiVersion: helm.cattle.io/v1
          metadata:
          kind: HelmChart
            name: cilium
            namespace: kube-system
          spec:
            chart: cilium
            repo: https://helm.cilium.io/
            targetNamespace: kube-system
            valuesContent: |
              operator:
                replicas: 1
              ipam:
                mode: cluster-pool
                operator:
                  clusterPoolIPv4PodCIDRList: ["{{ cluster_cidr }}"]
                  clusterPoolIPv4MaskSize: 24
              k8s-install-cilium-pod-cidr: "true"
              routingMode: tunnel
              tunnelProtocol: vxlan
              kubeProxyReplacement: true
              k8sServiceHost: 127.0.0.1
              k8sServicePort: 6443
              l2announcements:
                enabled: true
              externalIPs:
                enabled: true
              hubble:
                enabled: true
                relay:
                  enabled: true
                ui:
                  enabled: true
              ingressController:
                enabled: false

    - name: Install ArgoCD
      shell: |
        kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

    - name: Wait for ArgoCD CRDs to settle
      pause:
        seconds: 30
