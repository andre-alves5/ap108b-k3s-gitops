# Frontend-specific values
image: "andrealves5/study-buddy-frontend:latest"

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

# Shared config
config:
  cognitoDomain: "study-buddy.agallaghertech.online"
  awsRegion: "us-east-1"

# Ingress and Cloudflare Tunnel config
cloudflare:
  enabled: true
  hostname: "study-buddy.agallaghertech.online"
  secretName: "cloudflare-tunnel-secret"
