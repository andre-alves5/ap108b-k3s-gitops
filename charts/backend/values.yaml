# Backend-specific values
image: "andrealves5/study-buddy-backend:latest"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Shared config
config:
  cognitoDomain: "study-buddy.agallaghertech.online"
  awsRegion: "us-east-1"
  cognitoPoolId: ""
  cognitoClientId: ""

# Secrets
secrets:
  tlsDetails: "ai-processor-tls"
  cognitoSecretName: "cognito-secrets"
