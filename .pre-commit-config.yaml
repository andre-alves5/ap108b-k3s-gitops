repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: kustomize-validate
        name: Kustomize Validate
        entry: bash -c 'find . -name "kustomization.yaml" -not -path "*/.terraform/*" -execdir kubectl kustomize . > /dev/null \;'
        language: system
        always_run: true
        pass_filenames: false
