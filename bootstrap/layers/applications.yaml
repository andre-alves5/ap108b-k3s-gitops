apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: layer-applications
  namespace: argocd
spec:
  project: applications
  source:
    repoURL: 'https://github.com/andre-alves5/ap108b-k3s-gitops'
    targetRevision: HEAD
    path: apps
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 