apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: "User Applications"
  sourceRepos:
    - 'https://github.com/andre-alves5/ap108b-k3s-gitops.git'
  destinations:
    - server: 'https://kubernetes.default.svc'
      namespace: cloudflare
    - server: 'https://kubernetes.default.svc'
      namespace: argocd
    - server: 'https://kubernetes.default.svc'
      namespace: default